{% extends 'blog/base.html' %}

{% block title %}New Post{% endblock %}

{% block content %}
    <h1>New Post</h1>
    <!-- ectype="multipart/form-data" is required for image uploading to work-->
    <form method="POST" enctype="multipart/form-data">
        <!-- {% csrf_token %} adds a hidden security token to prevent forgery attacks-->
        {% csrf_token %}
        <!-- {{ form.as_p }} redners all fields automatically wrapped in <p> tags-->
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
{% endblock %}
